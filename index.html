<!doctype html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a1024" />
  <title>STAR NET ⭐</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="STAR NET" />
  <style>
    html,body{margin:0;padding:0;background:#0a1024;min-height:100vh}
    #root{min-height:100vh}
    #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a1024;color:#cdd6f4;font-family:Tahoma,sans-serif;gap:14px;z-index:9999}
    #boot .star{font-size:54px;animation:spin 1.6s linear infinite}
    #boot small{color:#8b95ac;font-size:13px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="boot"><div class="star">⭐</div><div>STAR NET</div><small>جارٍ التحميل…</small></div>

  <!-- مكتبات React (تُحفظ للعمل دون إنترنت بعد أول فتح) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <!-- مكتبة Excel (استيراد الأجهزة) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin></script>

  <!-- كود التطبيق -->
  <script type="text/babel" src="app.jsx" data-presets="react"></script>

  <script>
    // إخفاء شاشة التحميل بعد تشغيل التطبيق
    var __hide = setInterval(function(){
      if (document.querySelector('#root').childElementCount > 0) {
        var b = document.getElementById('boot'); if (b) b.remove();
        clearInterval(__hide);
      }
    }, 200);
    // تسجيل خدمة العمل دون إنترنت
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
